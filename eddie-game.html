<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>UNAUFHALTSAM | V5.5</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root{ --black:#000; --white:#fff; --purpur:#b01fa5; --bg:#f5f5f7; --grass:#e7f7e7; --shadow:rgba(0,0,0,.08); }
    *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
    body{ background:var(--bg); color:var(--black); min-height:100vh; padding:20px 14px 40px; overflow-x: hidden; }
    .wrap{ width:100%; max-width:980px; margin:0 auto; display:flex; flex-direction:column; gap:18px; }
    .topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .title h1{ font-size:clamp(24px, 5vw, 42px); line-height:1; margin-bottom:6px; font-weight:900; letter-spacing:-0.8px; }
    .title p{ font-size:13px; opacity:.7; font-weight: 700; text-transform: uppercase; }
    .btn{ appearance:none; border:none; background:#000; color:#fff; padding:14px 18px; border-radius:14px; font-weight:900; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; min-width:160px; transition:transform .15s ease, opacity .15s ease; }
    .btn:hover{ transform:translateY(-1px); opacity:.94; }
    .hud{ display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:12px; }
    .stat{ border:2px solid #000; border-radius:18px; padding:12px; background:#fff; text-align:center; }
    .stat .label{ font-size:10px; opacity:.6; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; font-weight: 800; }
    .stat .value{ font-size:clamp(18px, 4vw, 28px); font-weight:900; line-height:1; }
    .value.good{ color:var(--purpur); }
    .game-shell{ position:relative; width:100%; background:#fff; border:2px solid #000; border-radius:24px; overflow:hidden; box-shadow:0 10px 30px var(--shadow); }
    canvas{ display:block; width:100%; height:auto; cursor:default; background:linear-gradient(to bottom, #ffffff 0%, #ffffff 72%, var(--grass) 72%, var(--grass) 100%); touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    .overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:20px; background:rgba(255,255,255,.95); text-align:center; z-index:100; }
    .overlay.hidden{ display:none; }
    .card{ width:min(100%, 480px); background:#fff; border:2px solid #000; border-radius:22px; padding:30px 20px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
    .leaderboard-container { background:#fff; border:2px solid #000; border-radius:22px; padding:20px; margin-top:10px; }
    .leaderboard-title { font-weight:900; text-transform:uppercase; margin-bottom:12px; font-size:16px; border-bottom: 2px solid #000; padding-bottom: 8px; }
    .leaderboard-entry { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; font-weight:700; }
    #nameInput { border:2px solid #000; padding:14px; border-radius:12px; width:100%; font-size:18px; font-weight:900; text-align:center; margin-bottom:15px; outline:none; text-transform: uppercase; }
    .bottom-note{ text-align:center; font-size:11px; opacity:.5; font-weight: 700; margin-top: 10px; text-transform: uppercase; }
    @media (max-width:720px){ .hud{ grid-template-columns:repeat(2, minmax(0,1fr)); } .btn{ width:100%; } }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="title"><h1>UNAUFHALTSAM</h1><p>FIND THE FOCUS RING</p></div>
      <div class="actions"><button class="btn" id="restartTop">RESTART GAME</button></div>
    </div>
    <section class="hud">
      <div class="stat"><div class="label">Score</div><div class="value good" id="scoreValue">0</div></div>
      <div class="stat"><div class="label">Round</div><div class="value" id="roundValue">1</div></div>
      <div class="stat"><div class="label">Boxes</div><div class="value" id="boxValue">2</div></div>
      <div class="stat"><div class="label">Best</div><div class="value" id="bestValue">0</div></div>
    </section>
    <section class="game-shell">
      <canvas id="gameCanvas" width="960" height="540"></canvas>
      <div class="overlay" id="startOverlay"><div class="card"><h2>START</h2><p>Eddie shows the ring. Verfolgst du ihn?</p><button class="btn" id="startBtn" style="margin-top:20px;">START GAME</button></div></div>
      <div class="overlay hidden" id="nameOverlay"><div class="card"><h2>NEW HIGHSCORE!</h2><input type="text" id="nameInput" placeholder="YOUR NAME" maxlength="12"><button class="btn" id="saveScoreBtn">SAVE SCORE</button></div></div>
      <div class="overlay hidden" id="gameOverOverlay"><div class="card"><h2>FOCUS LOST</h2><div style="font-size:48px; font-weight:900; color:var(--purpur); margin:10px 0;" id="finalScore">0</div><p id="bestLine" style="font-weight:700; margin-bottom:20px;">Best: 0</p><button class="btn" id="restartBtn">PLAY AGAIN</button></div></div>
      <div class="overlay hidden" id="statsOverlay"><div class="card"><h2 style="font-weight:900;">TEST STATS</h2><div id="statsContent" style="text-align:left; margin:16px 0; font-weight:700; line-height:1.6; font-size:15px;"></div><button class="btn" id="closeStatsBtn">CLOSE</button></div></div>
    </section>
    <section class="leaderboard-container"><div class="leaderboard-title">Eddie's Top 10</div><ul class="leaderboard-list" id="leaderboardList"></ul></section>
    <div class="bottom-note">Protocol V5.5 Active. Unstoppable.</div>
  </main>

  <script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const scoreValue = document.getElementById("scoreValue"), roundValue = document.getElementById("roundValue"), boxValue = document.getElementById("boxValue"), bestValue = document.getElementById("bestValue");
    const startOverlay = document.getElementById("startOverlay"), nameOverlay = document.getElementById("nameOverlay"), gameOverOverlay = document.getElementById("gameOverOverlay"), statsOverlay = document.getElementById("statsOverlay"), statsContent = document.getElementById("statsContent");
    const startBtn = document.getElementById("startBtn"), restartBtn = document.getElementById("restartBtn"), restartTop = document.getElementById("restartTop"), saveScoreBtn = document.getElementById("saveScoreBtn"), closeStatsBtn = document.getElementById("closeStatsBtn");
    const nameInput = document.getElementById("nameInput"), leaderboardList = document.getElementById("leaderboardList"), finalScoreDisplay = document.getElementById("finalScore"), bestLineDisplay = document.getElementById("bestLine");

    const imgEddieHead = new Image(); imgEddieHead.src = "eddie_head.png";
    const imgEddieTongue = new Image(); imgEddieTongue.src = "eddie_tongue.png";
    const imgBrand = new Image(); imgBrand.src = "unaufhaltsam_brand.png";

    const BEST_KEY = "eddieBoxBest_v1", LEADERBOARD_KEY = "eddieLeaderboard_v1", TRACK_PLAYED = "eddie_played_once", TRACK_RETRIES = "eddie_retry_count", TRACK_RUNS = "eddie_runs_history";

    let eddieTapTimes = [];
    const state = { 
      running: false, score: 0, round: 1, boxCount: 2, 
      best: Number(localStorage.getItem(BEST_KEY) || 0), 
      phase: "idle", phaseStartedAt: 0, selectedBoxId: null, correctBoxId: null, 
      hoverBoxId: null, result: null, showBallTime: 1400, shuffleDuration: 2200, 
      swapsRemaining: 0, activeSwap: null, lastTs: 0, glowPulse: 0, 
      startBoxId: null, startSlotX: null, startSlotY: null, breatherMs: 300 
    };

    const eddie = { x: canvas.width / 2, y: 80, lookTargetX: canvas.width / 2, lookTargetY: 300, happyFlash: 0, sadFlash: 0, idleBob: 0 };
    const boxes = [], particles = [];

    function nowMs() { return performance.now(); }
    function setPhase(next) { state.phase = next; state.phaseStartedAt = nowMs(); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
    function roundRect(c, x, y, w, h, r, f, s) { 
      c.beginPath(); c.moveTo(x+r, y); c.lineTo(x+w-r, y); c.quadraticCurveTo(x+w, y, x+w, y+r); 
      c.lineTo(x+w, y+h-r); c.quadraticCurveTo(x+w, y+h, x+w-r, y+h); c.lineTo(x+r, y+h); 
      c.quadraticCurveTo(x, y+h, x, y+h-r); c.lineTo(x, y+r); c.quadraticCurveTo(x, y, x+r, y); 
      c.closePath(); if (f) c.fill(); if (s) c.stroke(); 
    }

    function drawTextCircle(text, cx, cy, r){
      const chars = text.split(""); const step = (Math.PI * 2) / chars.length; const rot = performance.now() / 12000;
      ctx.save(); ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = `900 ${Math.max(7, r * 0.55)}px Arial`;
      chars.forEach((c, i) => { const a = i * step + rot; const x = cx + Math.cos(a) * r; const y = cy + Math.sin(a) * r; 
        ctx.save(); ctx.translate(x, y); ctx.rotate(a + Math.PI / 2); ctx.strokeStyle = "#b01fa5"; ctx.lineWidth = 1.5; ctx.strokeText(c, 0, 0); ctx.restore(); 
      });
      ctx.restore();
    }

    function drawBoxes() {
      boxes.forEach(b => {
        const isH = state.phase === "pick" && state.hoverBoxId === b.id;
        const y = b.y - b.lift;
        const cx = b.x + b.w / 2;
        const cy = y + b.h / 2;

        ctx.save();
        let tilt = 0;
        if (state.phase === "shuffle" && state.activeSwap) {
          if (b.id === state.activeSwap.aId) tilt = -0.06;
          else if (b.id === state.activeSwap.bId) tilt = 0.06;
        }
        ctx.translate(cx, cy); ctx.rotate(tilt); ctx.translate(-cx, -cy);

        ctx.fillStyle = isH ? "#eee" : "white";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;
        roundRect(ctx, b.x, y, b.w, b.h, 12, true, true);

        const pad = b.w * 0.04;
        ctx.save();
        ctx.globalAlpha = 0.95;
        if (imgEddieTongue.complete) {
          ctx.drawImage(imgEddieTongue, b.x + pad, y + pad, b.w - pad * 2, b.h - pad * 2);
        }
        ctx.restore();

        if (isH) {
          ctx.strokeStyle = "#b01fa5";
          ctx.lineWidth = 5;
          roundRect(ctx, b.x - 4, y - 4, b.w + 8, b.h + 8, 14, false, true);
        }

        if (state.phase === "reveal" && state.selectedBoxId === b.id) {
          ctx.strokeStyle = state.selectedBoxId === state.correctBoxId ? "#0f9d58" : "#d92d20";
          ctx.lineWidth = 5;
          roundRect(ctx, b.x - 4, y - 4, b.w + 8, b.h + 8, 14, false, true);
        }

        if (state.phase === "reveal" && b.id === state.correctBoxId && imgBrand.complete) {
          const brW = Math.max(b.w * 1.15, 110);
          const brH = brW * (imgBrand.height / imgBrand.width || 0.2);
          const brX = b.x + b.w / 2 - brW / 2;
          const brY = y + b.h + 10;
          ctx.save();
          ctx.fillStyle = "rgba(255,255,255,0.96)";
          ctx.strokeStyle = "#000";
          ctx.lineWidth = 2;
          roundRect(ctx, brX - 8, brY - 4, brW + 16, brH + 8, 10, true, true);
          ctx.drawImage(imgBrand, brX, brY, brW, brH);
          ctx.restore();
        }
        ctx.restore();
      });
    }

    function updateLeaderboardUI() { 
      const scores = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]"); 
      leaderboardList.innerHTML = scores.length ? scores.map((s, i) => `<li class="leaderboard-entry"><span class="leaderboard-rank">#${i+1}</span><span class="leaderboard-name">${s.name}</span><span class="leaderboard-score">${s.score}</span></li>`).join('') : '<li class="leaderboard-entry">No entries yet</li>'; 
    }
    function saveScore() { 
      const name = nameInput.value.trim().toUpperCase() || "ANONYMOUS"; 
      let scores = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]"); 
      scores.push({ name, score: state.score, date: Date.now() }); 
      scores.sort((a, b) => b.score - a.score); 
      localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(scores.slice(0, 10))); 
      updateLeaderboardUI(); 
      nameOverlay.classList.add("hidden"); 
      gameOverOverlay.classList.remove("hidden"); 
    }
    function renderStatsOverlay() { 
      const played = localStorage.getItem(TRACK_PLAYED) === "true" ? "Yes" : "No"; 
      const retries = Number(localStorage.getItem(TRACK_RETRIES) || 0); 
      const runs = JSON.parse(localStorage.getItem(TRACK_RUNS) || "[]"); 
      const last10 = runs.slice(-10).reverse(); 
      const avg = runs.length ? (runs.reduce((sum, r) => sum + Number(r.s || 0), 0) / runs.length).toFixed(1) : "0.0"; 
      statsContent.innerHTML = `<div>Played once: ${played}</div><div>Total Retries: ${retries}</div><div>Runs saved: ${runs.length}</div><div>Avg Score: ${avg}</div><div style="margin-top:10px;">Last Scores: ${last10.map(r=>r.s).join(', ') || 'None'}</div>`; 
      statsOverlay.classList.remove("hidden"); 
    }

    function buildRound() {
      boxes.length = 0; state.activeSwap = null; state.selectedBoxId = null; state.hoverBoxId = null;
      const count = state.boxCount; 
      let cols = Math.ceil(Math.sqrt(count));
      if (count <= 6) cols = count; else if (count <= 12) cols = Math.ceil(count / 2); else cols = Math.ceil(count / 3);
      const rows = Math.ceil(count / cols), spacing = 24, availableW = canvas.width - 160, availableH = canvas.height - 200;
      const boxW = Math.min(92, Math.min(availableW / cols - spacing, availableH / rows - spacing)), boxH = boxW;
      const gridW = cols * boxW + (cols - 1) * spacing, gridH = rows * boxH + (rows - 1) * spacing;
      const startX = (canvas.width - gridW) / 2, startY = 160 + (availableH - gridH) / 2;
      for (let i = 0; i < count; i++) { 
        const r = Math.floor(i / cols), c = i % cols; 
        boxes.push({ id: i, x: startX + c * (boxW + spacing), y: startY + r * (boxH + spacing), w: boxW, h: boxH, lift: 0 }); 
      }
      state.correctBoxId = Math.floor(Math.random() * count); 
      state.startBoxId = state.correctBoxId;
      const startBox = boxes.find(b => b.id === state.correctBoxId); 
      state.startSlotX = startBox.x; state.startSlotY = startBox.y;
      eddie.x = canvas.width / 2; eddie.y = Math.max(65, startY - 95); 
      eddie.lookTargetX = startBox.x + boxW / 2; eddie.lookTargetY = startBox.y + boxH / 2;
      state.shuffleDuration = Math.max(1200, 2400 - state.score * 55); 
      state.swapsRemaining = Math.max(4, 4 + Math.floor(count * 1.6)); 
      state.glowPulse = 1; 
      setPhase("show");
    }

    function startNextSwap() {
      const cur = boxes.find(b => b.id === state.correctBoxId);
      if (state.swapsRemaining <= 0) {
        if (cur && Math.abs(cur.x - state.startSlotX) < 0.1 && Math.abs(cur.y - state.startSlotY) < 0.1) {
          let t; do { t = boxes[Math.floor(Math.random() * boxes.length)]; } while (t.id === state.correctBoxId);
          state.activeSwap = { aId: cur.id, bId: t.id, aStartX: cur.x, bStartX: t.x, aStartY: cur.y, bStartY: t.y, aTargetX: t.x, bTargetX: cur.x, aTargetY: t.y, bTargetY: cur.y, start: nowMs(), duration: 350 }; return;
        }
        state.activeSwap = null; setPhase("wait"); return;
      }
      let a = Math.floor(Math.random() * boxes.length), b = Math.floor(Math.random() * boxes.length);
      while (b === a) b = Math.floor(Math.random() * boxes.length);
      const boxA = boxes[a], boxB = boxes[b];
      state.activeSwap = { aId: boxA.id, bId: boxB.id, aStartX: boxA.x, bStartX: boxB.x, aStartY: boxA.y, bStartY: boxB.y, aTargetX: boxB.x, bTargetX: boxA.x, aTargetY: boxB.y, bTargetY: boxA.y, start: nowMs(), duration: Math.max(260, state.shuffleDuration / 5.2) };
      state.swapsRemaining--;
    }

    function updateBoxes(ts) {
      if (state.phase === "show" && ts - state.phaseStartedAt > state.showBallTime) { setPhase("shuffle"); startNextSwap(); }
      else if (state.phase === "shuffle") {
        if (!state.activeSwap) { startNextSwap(); return; }
        const s = state.activeSwap, p = Math.min(1, (ts - s.start) / s.duration), bA = boxes.find(b => b.id === s.aId), bB = boxes.find(b => b.id === s.bId);
        const e = easeInOutQuad(p);
        bA.x = lerp(s.aStartX, s.aTargetX, e); bB.x = lerp(s.bStartX, s.bTargetX, e); bA.y = lerp(s.aStartY, s.aTargetY, e); bB.y = lerp(s.bStartY, s.bTargetY, e);
        if (p >= 1) { bA.x = s.aTargetX; bA.y = s.aTargetY; bB.x = s.bTargetX; bB.y = s.bTargetY; state.activeSwap = null; }
      }
      else if (state.phase === "wait" && ts - state.phaseStartedAt > state.breatherMs) { setPhase("pick"); }
      else if (state.phase === "reveal") {
        const sel = boxes.find(b => b.id === state.selectedBoxId), cor = boxes.find(b => b.id === state.correctBoxId);
        if (sel) sel.lift = Math.min(sel.h * 0.8, sel.lift + 5); if (cor && cor.id !== state.selectedBoxId) cor.lift = Math.min(cor.h * 0.8, cor.lift + 5);
        if (ts - state.phaseStartedAt > 1200) { if (state.selectedBoxId === state.correctBoxId) { state.score++; state.round++; state.boxCount = Math.min(18, 2 + Math.floor(state.score / 1.5)); eddie.happyFlash = 0.5; eddie.sadFlash = 0; buildRound(); updateHud(); } else gameOver(); }
      }
      if (state.phase !== "reveal") { boxes.forEach(b => b.lift = Math.max(0, b.lift - 6)); }
    }

    function updateEddie(dt) { if (eddie.happyFlash > 0) eddie.happyFlash -= dt; if (eddie.sadFlash > 0) eddie.sadFlash -= dt; if (state.glowPulse > 0) state.glowPulse -= dt * 1.5; eddie.idleBob = Math.sin(nowMs() / 400) * 2; }
    function drawBallMarker() { if (state.phase !== "show") return; const b = boxes.find(bx => bx.id === state.correctBoxId); if (!b) return; const cx = b.x + b.w / 2, cy = b.y + b.h + (b.h * 0.25), r = b.w * 0.22; if (state.glowPulse > 0) { ctx.save(); ctx.globalAlpha = state.glowPulse * 0.6; ctx.shadowColor = "#b01fa5"; ctx.shadowBlur = 25 * state.glowPulse; drawTextCircle("UNAUFHALTSAM", cx, cy, r); ctx.restore(); } drawTextCircle("UNAUFHALTSAM", cx, cy, r); }

    function drawEddie() {
      ctx.save(); ctx.translate(eddie.x, eddie.y + eddie.idleBob); ctx.scale(0.85, 0.85);
      if (eddie.sadFlash > 0) ctx.rotate(0.08);
      if (imgEddieHead.complete) { ctx.drawImage(imgEddieHead, -50, -50, 100, 100); }
      if (eddie.happyFlash > 0 && imgEddieTongue.complete) {
        const tW = 28, tH = 34; ctx.drawImage(imgEddieTongue, -tW/2, 4, tW, tH);
      }
      ctx.restore();
    }

    function spawnParticles(x, y) { for (let i = 0; i < 14; i++) particles.push({ x, y, vx: (Math.random() - 0.5) * 5, vy: -Math.random() * 4 - 1, life: 1, size: Math.random() * 4 + 2 }); }
    function updateParticles(dt) { for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx * 60 * dt; p.y += p.vy * 60 * dt; p.vy += 0.12; p.life -= 1.8 * dt; if (p.life <= 0) particles.splice(i, 1); } }
    function drawParticles() { for (const p of particles) { ctx.save(); ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = "#b01fa5"; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); } }
    
    function gameOver() { 
      state.running = false; setPhase("gameover"); if (state.score > state.best) { state.best = state.score; localStorage.setItem(BEST_KEY, String(state.best)); } finalScoreDisplay.textContent = state.score; bestLineDisplay.textContent = `Best: ${state.best}`; updateHud(); eddie.sadFlash = 1;
      let history = JSON.parse(localStorage.getItem(TRACK_RUNS) || "[]"); history.push({ s: state.score, t: Date.now() }); localStorage.setItem(TRACK_RUNS, JSON.stringify(history.slice(-50)));
      if (state.score > 0 && (JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]").length < 10 || state.score > JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]")[9].score)) nameOverlay.classList.remove("hidden"); else gameOverOverlay.classList.remove("hidden"); 
    }

    function updateHud() { scoreValue.textContent = state.score; roundValue.textContent = state.round; boxValue.textContent = state.boxCount; bestValue.textContent = state.best; }
    function resetGame() { state.running = false; state.score = 0; state.round = 1; state.boxCount = 2; buildRound(); updateHud(); gameOverOverlay.classList.add("hidden"); nameOverlay.classList.add("hidden"); startOverlay.classList.remove("hidden"); }

    function startGame() {
      state.running = true; state.score = 0; state.round = 1; state.boxCount = 2; state.selectedBoxId = null; state.hoverBoxId = null; state.result = null; state.activeSwap = null; eddie.happyFlash = 0; eddie.sadFlash = 0;
      buildRound(); updateHud();
      startOverlay.classList.add("hidden"); gameOverOverlay.classList.add("hidden"); nameOverlay.classList.add("hidden");
      if (!localStorage.getItem(TRACK_PLAYED)) localStorage.setItem(TRACK_PLAYED, "true");
    }

    function loop(ts) { const dt = Math.min(0.033, (ts - state.lastTs) / 1000); state.lastTs = ts; ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#fff"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#eef9ee"; ctx.fillRect(0, 400, canvas.width, 140); updateBoxes(ts); updateEddie(dt); updateParticles(dt); drawParticles(); drawBallMarker(); drawBoxes(); drawEddie(); requestAnimationFrame(loop); }
    
    canvas.addEventListener("mousemove", (e) => {
      if (state.phase !== "pick") { state.hoverBoxId = null; return; }
      const rect = canvas.getBoundingClientRect(), x = (e.clientX - rect.left) * (canvas.width/rect.width), y = (e.clientY - rect.top) * (canvas.height/rect.height); 
      state.hoverBoxId = null; 
      boxes.forEach(b => { if (x >= b.x && x <= b.x+b.w && y >= (b.y - b.lift) && y <= (b.y - b.lift)+b.h) state.hoverBoxId = b.id; }); 
    });

    canvas.addEventListener("click", (e) => {
      const rect = canvas.getBoundingClientRect(), x = (e.clientX - rect.left) * (canvas.width/rect.width), y = (e.clientY - rect.top) * (canvas.height/rect.height);
      const ex = eddie.x, ey = eddie.y + eddie.idleBob, ew = 120, eh = 110;
      if (x >= ex - ew/2 && x <= ex + ew/2 && y >= ey - eh/2 && y <= ey + eh/2) {
        const now = Date.now(); eddieTapTimes = eddieTapTimes.filter(t => now - t < 1200); eddieTapTimes.push(now);
        if (eddieTapTimes.length >= 5) { eddieTapTimes = []; renderStatsOverlay(); return; }
      }
      if (state.phase === "pick" && state.hoverBoxId !== null) {
        const id = state.hoverBoxId; state.selectedBoxId = id; if (id === state.correctBoxId) { state.result = "correct"; eddie.happyFlash = 0.55; state.glowPulse = 1; spawnParticles(boxes.find(b => b.id === id).x + boxes.find(b => b.id === id).w/2, boxes.find(b => b.id === id).y + boxes.find(b => b.id === id).h + 20); } else { state.result = "wrong"; eddie.sadFlash = 0.55; } setPhase("reveal");
      }
    });

    startBtn.onclick = startGame; restartTop.onclick = resetGame; saveScoreBtn.onclick = saveScore; closeStatsBtn.onclick = () => statsOverlay.classList.add("hidden");
    restartBtn.onclick = () => { let r = Number(localStorage.getItem(TRACK_RETRIES) || 0); localStorage.setItem(TRACK_RETRIES, r + 1); startGame(); };
    nameInput.onkeydown = (e) => { if(e.key === 'Enter') saveScore(); };

    let loaded = 0;
    const done = () => { loaded++; if (loaded >= 3) { updateLeaderboardUI(); resetGame(); requestAnimationFrame(loop); } };
    imgEddieHead.onload = done; imgEddieHead.onerror = done;
    imgEddieTongue.onload = done; imgEddieTongue.onerror = done;
    imgBrand.onload = done; imgBrand.onerror = done;
  </script>
</body>
</html>
