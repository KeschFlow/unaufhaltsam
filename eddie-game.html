<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>UNAUFHALTSAM | Elite Focus Training</title>
  <meta name="theme-color" content="#b01fa5" />
  <meta name="apple-mobile-web-app-title" content="UNAUFHALTSAM" />
  <meta name="application-name" content="UNAUFHALTSAM" />
  <meta name="description" content="Track the focus ring. Train precision. Enter pressure mode." />

  <meta property="og:title" content="UNAUFHALTSAM | Elite Focus Training" />
  <meta property="og:description" content="Track the ring. Beat the grid. Test your focus." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-unaufhaltsam.jpg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="UNAUFHALTSAM | Elite Focus Training" />
  <meta name="twitter:description" content="Track the ring. Beat the grid. Test your focus." />
  <meta name="twitter:image" content="/og-unaufhaltsam.jpg" />

  <style>
    :root{
      --black:#000; --white:#fff; --purpur:#b01fa5; --bg:#f5f5f7;
      --grass:#e7f7e7; --red:#d92d20; --green:#0f9d58; --shadow:rgba(0,0,0,.08);
    }
    *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
    body{ background:var(--bg); color:var(--black); min-height:100vh; padding:20px 14px 40px; }
    .wrap{ width:100%; max-width:1180px; margin:0 auto; display:flex; flex-direction:column; gap:18px; }
    .topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .title h1{ font-size:clamp(28px, 5vw, 52px); line-height:1; margin-bottom:8px; font-weight:900; letter-spacing:-0.8px; }
    .title p{ font-size:14px; opacity:.75; font-weight:700; color:var(--purpur); }
    .btn{ appearance:none; border:none; background:#000; color:#fff; padding:14px 18px; border-radius:14px; font-weight:900; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; min-width:180px; transition:all .15s ease; }
    .btn:hover{ transform:translateY(-1px); opacity:.94; box-shadow:0 4px 12px var(--shadow); }
    .hud{ display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:12px; }
    .stat{ border:2px solid #000; border-radius:18px; padding:14px 12px; background:#fff; text-align:center; }
    .stat .label{ font-size:12px; opacity:.7; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    .stat .value{ font-size:clamp(22px, 4vw, 34px); font-weight:900; line-height:1; }
    .value.good{ color:var(--purpur); }
    .game-shell{ position:relative; width:100%; background:#fff; border:2px solid #000; border-radius:24px; overflow:hidden; box-shadow:0 10px 30px var(--shadow); }
    canvas{ display:block; width:100%; height:auto; cursor:default; background:linear-gradient(to bottom, #ffffff 0%, #ffffff 74%, var(--grass) 74%, var(--grass) 100%); }
    
    .overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:20px; background:rgba(255,255,255,.94); text-align:center; z-index:10; }
    .overlay.hidden{ display:none; }
    .card{ width:min(100%, 560px); background:#fff; border:2px solid #000; border-radius:22px; padding:30px 24px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
    
    #stageOverlay { background: rgba(255,255,255,0.85); z-index: 20; pointer-events: none; }
    .stage-card { border: 3px solid var(--black); border-radius: 20px; background: var(--white); padding: 20px 40px; box-shadow: 0 10px 40px rgba(176,31,165,0.15); transform: scale(0.9); animation: stageIn 0.8s ease-out; }
    @keyframes stageIn { 0% { transform: scale(0.8); opacity: 0; } 20% { transform: scale(1.05); opacity: 1; } 80% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.1); opacity: 0; } }

    .leaderboard-container{ background:#fff; border:2px solid #000; border-radius:22px; padding:20px; margin-top:10px; }
    .leaderboard-title{ font-weight:900; text-transform:uppercase; margin-bottom:15px; font-size:18px; }
    .leaderboard-entry{ display:flex; justify-content:space-between; padding:8px 12px; border-bottom:1px solid #eee; font-weight:700; transition:all .22s ease; border-radius:10px; }
    .leaderboard-entry.flash{ background:rgba(176,31,165,.10); box-shadow:0 0 0 2px rgba(176,31,165,.22); transform:scale(1.02); animation:scoreFlash 1.2s ease; }
    @keyframes scoreFlash{ 0%{ transform:scale(1.04); background:rgba(176,31,165,.22); } 100% { transform:scale(1); background:transparent; } }

    #nameInput{ border:2px solid #000; padding:12px; border-radius:10px; width:100%; font-size:18px; font-weight:700; text-align:center; margin-bottom:15px; outline:none; }
    @media (max-width:720px){ .hud{ grid-template-columns:repeat(2, minmax(0,1fr)); } .btn{ width:100%; } }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="title"><h1>UNAUFHALTSAM</h1><p>FINE-TUNED PROGRESSION</p></div>
      <div class="actions"><button class="btn" id="restartTop">RESTART GAME</button></div>
    </div>
    <section class="hud">
      <div class="stat"><div class="label">Score</div><div class="value good" id="scoreValue">0</div></div>
      <div class="stat"><div class="label">Round</div><div class="value" id="roundValue">1</div></div>
      <div class="stat"><div class="label">Boxes</div><div class="value" id="boxValue">2</div></div>
      <div class="stat"><div class="label">Best</div><div class="value" id="bestValue">0</div></div>
    </section>
    <section class="game-shell">
      <canvas id="gameCanvas" width="1200" height="720"></canvas>
      
      <div class="overlay hidden" id="stageOverlay">
        <div class="stage-card">
          <div style="color:var(--purpur); font-weight:900; font-size:14px; letter-spacing:2px;" id="stageLabel">STAGE 2</div>
          <h2 style="font-weight:900; margin-top:5px; text-transform:uppercase;" id="stageTitle">GRID OPEN</h2>
        </div>
      </div>

      <div class="overlay" id="startOverlay">
        <div class="card">
          <h2 style="font-weight:900;">START TRAINING</h2>
          <p>Track the ring. The focus tightens as you progress.</p>
          <button class="btn" id="startBtn" style="margin-top:15px;">START</button>
        </div>
      </div>
      
      <div class="overlay hidden" id="nameOverlay">
        <div class="card">
          <h2 style="font-weight:900;">ELITE FOCUS</h2>
          <p>Local Highscore Qualification:</p>
          <input type="text" id="nameInput" placeholder="YOUR NAME" maxlength="12">
          <button class="btn" id="saveScoreBtn">SAVE RECORD</button>
        </div>
      </div>

      <div class="overlay hidden" id="gameOverOverlay">
        <div class="card">
          <h2 style="font-weight:900;">FOCUS LOST</h2>
          <div style="font-size:48px; font-weight:900; color:var(--purpur); margin:10px 0;" id="finalScore">0</div>
          <p id="bestLine">Best: 0</p>
          <button class="btn" id="restartBtn" style="margin-top:15px;">TRY AGAIN</button>
          <button class="btn" id="shareScoreBtn" style="margin-top:12px;">SHARE SCORE</button>
          <p id="shareFeedback" style="margin-top:10px; font-size:13px; font-weight:700; color:var(--purpur); min-height:18px;"></p>
        </div>
      </div>
    </section>
    <section class="leaderboard-container"><div class="leaderboard-title">Eddie's Top 10</div><ul class="leaderboard-list" id="leaderboardList"></ul></section>
  </main>

  <script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const scoreVal = document.getElementById("scoreValue"), roundVal = document.getElementById("roundValue"), boxVal = document.getElementById("boxValue"), bestVal = document.getElementById("bestValue");
    const startOverlay = document.getElementById("startOverlay"), nameOverlay = document.getElementById("nameOverlay"), gameOverOverlay = document.getElementById("gameOverOverlay"), stageOverlay = document.getElementById("stageOverlay");
    const startBtn = document.getElementById("startBtn"), restartBtn = document.getElementById("restartBtn"), restartTop = document.getElementById("restartTop"), saveScoreBtn = document.getElementById("saveScoreBtn"), shareScoreBtn = document.getElementById("shareScoreBtn");
    const nameInput = document.getElementById("nameInput"), leaderboardList = document.getElementById("leaderboardList"), finalScoreDisplay = document.getElementById("finalScore"), bestLineDisplay = document.getElementById("bestLine"), shareFeedback = document.getElementById("shareFeedback"), stageLabel = document.getElementById("stageLabel"), stageTitle = document.getElementById("stageTitle");

    const BEST_KEY = "eddieV4_best", LEADERBOARD_KEY = "eddieV4_leaderboard";

    const state = {
      running: false, score: 0, round: 1, boxCount: 2,
      best: Number(localStorage.getItem(BEST_KEY) || 0),
      phase: "idle", phaseStartedAt: 0,
      selectedBoxId: null, correctBoxId: null, hoverBoxId: null,
      activeSwap: null, swapsRemaining: 0, result: null,
      showBallTime: 1400, shuffleDuration: 2200, lastTs: 0, 
      glowPulse: 0, startBoxId: null, stage: 1
    };

    const eddie = { x: 145, y: 585, lookTargetX: 0, tongue: false, happyFlash: 0, sadFlash: 0 };
    const boxes = [], particles = [];

    function nowMs(){ return performance.now(); }
    function setPhase(next){ state.phase = next; state.phaseStartedAt = nowMs(); }
    function lerp(a, b, t){ return a + (b - a) * t; }
    function easeInOutQuad(t){ return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
    
    function getBreatherMs() {
      if (state.stage === 1) return 220;
      if (state.stage === 2) return 180;
      if (state.score < 11) return 160;
      return 140;
    }

    function renderLeaderboard(highlightDate = null) {
      const scores = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]");
      leaderboardList.innerHTML = scores.length
        ? scores.map((s, i) => `<li class="leaderboard-entry ${highlightDate && s.date === highlightDate ? 'flash' : ''}"><span style="color:var(--purpur)">#${i + 1}</span><span style="flex:1; text-align:left; padding-left:15px;">${s.name}</span><span>${s.score}</span></li>`).join('')
        : '<li class="leaderboard-entry">No entries yet</li>';
    }

    function roundRect(c, x, y, w, h, r, f, s){
      c.beginPath(); c.moveTo(x+r, y); c.lineTo(x+w-r, y); c.quadraticCurveTo(x+w, y, x+w, y+r); c.lineTo(x+w, y+h-r); c.quadraticCurveTo(x+w, y+h, x+w-r, y+h); c.lineTo(x+r, y+h); c.quadraticCurveTo(x, y+h, x, y+h-r); c.lineTo(x, y+r); c.quadraticCurveTo(x, y, x+r, y); c.closePath();
      if (f) c.fill(); if (s) c.stroke();
    }

    function drawTextCircle(text, cx, cy, r){
      const chars = text.split(""), step = (Math.PI * 2) / chars.length, rot = performance.now() / 12000;
      ctx.save(); ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = "900 11px Arial";
      chars.forEach((ch, i) => {
        const a = i * step + rot, x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
        ctx.save(); ctx.translate(x, y); ctx.rotate(a + Math.PI / 2); ctx.strokeStyle = "#b01fa5"; ctx.lineWidth = 1.5; ctx.strokeText(ch, 0, 0); ctx.restore();
      });
      ctx.restore();
    }

    function buildRound() {
      boxes.length = 0; state.activeSwap = null; state.selectedBoxId = null; state.result = null;
      const prevStage = state.stage;
      if(state.score < 4) state.stage = 1; else if(state.score < 8) state.stage = 2; else state.stage = 3;

      if (state.running && state.stage > prevStage) {
        stageLabel.textContent = `STAGE ${state.stage}`;
        stageTitle.textContent = state.stage === 2 ? "GRID OPEN" : "PRESSURE MODE";
        stageOverlay.classList.remove("hidden");
        setPhase("stage_intro");
        setTimeout(() => {
          stageOverlay.classList.add("hidden");
          finalizeBuild();
          setPhase("show");
        }, 800);
        return;
      }
      finalizeBuild();
      setPhase("show");
    }

    function finalizeBuild() {
      const count = state.boxCount, colCount = (count <= 3) ? count : (count <= 6 ? 3 : 4);
      const rowCount = Math.ceil(count / colCount);
      const fieldLeft = 280, fieldTop = 100, fieldW = 860, fieldH = 440;
      const boxSize = Math.max(75, Math.min(110, (fieldW / colCount) - 20, (fieldH / rowCount) - 20));
      const gridW = colCount * boxSize + (colCount-1)*20, gridH = rowCount * boxSize + (rowCount-1)*20;
      const startX = fieldLeft + (fieldW - gridW)/2, startY = fieldTop + (fieldH - gridH)/2;
      for (let i = 0; i < count; i++) {
        const c = i % colCount, r = Math.floor(i / colCount);
        boxes.push({ id: i, x: startX + c * (boxSize+20), y: startY + r * (boxSize+20), w: boxSize, h: boxSize, lift: 0 });
      }
      state.correctBoxId = Math.floor(Math.random() * count); state.startBoxId = state.correctBoxId;
      state.showBallTime = Math.max(600, 1400 - state.score * 70);
      state.shuffleDuration = Math.max(800, 2200 - state.score * 50);
      state.swapsRemaining = Math.max(5, 5 + Math.floor(count * 1.5));
      state.glowPulse = 1;
    }

    function startNextSwap() {
      if (state.swapsRemaining <= 0) {
        if (state.correctBoxId === state.startBoxId) {
          let tIdx; do { tIdx = Math.floor(Math.random() * boxes.length); } while (tIdx === state.correctBoxId);
          const bA = boxes.find(b => b.id === state.correctBoxId), bB = boxes[tIdx];
          state.activeSwap = { aId: bA.id, bId: bB.id, aStartX: bA.x, aStartY: bA.y, bStartX: bB.x, bStartY: bB.y, aTargetX: bB.x, aTargetY: bB.y, bTargetX: bA.x, bTargetY: bA.y, start: nowMs(), duration: 380, fake: false };
          state.swapsRemaining = 0; return;
        }
        state.activeSwap = null; setPhase("wait"); return;
      }
      let a = Math.floor(Math.random() * boxes.length), b = Math.floor(Math.random() * boxes.length);
      while (b === a) b = Math.floor(Math.random() * boxes.length);
      const isFake = state.stage === 3 && Math.random() < 0.25;
      state.activeSwap = { aId: boxes[a].id, bId: boxes[b].id, aStartX: boxes[a].x, aStartY: boxes[a].y, bStartX: boxes[b].x, bStartY: boxes[b].y, aTargetX: boxes[b].x, aTargetY: boxes[b].y, bTargetX: boxes[a].x, bTargetY: boxes[a].y, start: nowMs(), duration: Math.max(240, state.shuffleDuration / 4.5), fake: isFake };
      state.swapsRemaining--;
    }

    function updateBoxes(ts) {
      if (state.phase === "show" && ts - state.phaseStartedAt > state.showBallTime) { setPhase("shuffle"); startNextSwap(); }
      else if (state.phase === "shuffle") {
        if (!state.activeSwap) { startNextSwap(); return; }
        const s = state.activeSwap, p = Math.min(1, (ts - s.start) / s.duration), bA = boxes.find(b => b.id === s.aId), bB = boxes.find(b => b.id === s.bId);
        if (s.fake) {
          const fp = Math.sin(p * Math.PI);
          bA.x = lerp(s.aStartX, (s.aStartX+s.aTargetX)/2, fp); bA.y = lerp(s.aStartY, (s.aStartY+s.aTargetY)/2, fp) - fp*20;
          bB.x = lerp(s.bStartX, (s.bStartX+s.bTargetX)/2, fp); bB.y = lerp(s.bStartY, (s.bStartY+s.bTargetY)/2, fp) + fp*10;
        } else {
          const eased = easeInOutQuad(p), arc = Math.sin(p * Math.PI);
          bA.x = lerp(s.aStartX, s.aTargetX, eased); bA.y = lerp(s.aStartY, s.aTargetY, eased) - arc*35;
          bB.x = lerp(s.bStartX, s.bTargetX, eased); bB.y = lerp(s.bStartY, s.bTargetY, eased) + arc*15;
        }
        if (p >= 1) { bA.x = s.aTargetX; bA.y = s.aTargetY; bB.x = s.bTargetX; bB.y = s.bTargetY; if (!s.fake) { if (state.correctBoxId === bA.id) state.correctBoxId = bB.id; else if (state.correctBoxId === bB.id) state.correctBoxId = bA.id; } state.activeSwap = null; }
      } else if (state.phase === "wait") {
        if (ts - state.phaseStartedAt > getBreatherMs()) setPhase("pick");
      } else if (state.phase === "reveal") {
        const c = boxes.find(b => b.id === state.selectedBoxId), corr = boxes.find(b => b.id === state.correctBoxId);
        if (c) c.lift = Math.min(72, c.lift + 5); if (corr && corr.id !== state.selectedBoxId) corr.lift = Math.min(72, corr.lift + 5);
        if (ts - state.phaseStartedAt > 1100) { if (state.result === "correct") { state.score++; state.round++; state.boxCount = Math.min(12, 2 + Math.floor(state.score/1.3)); eddie.happyFlash = 0.55; buildRound(); updateHud(); } else gameOver(); }
      }
      boxes.forEach(b => { if (state.phase !== "reveal") b.lift = Math.max(0, b.lift - 6); });
    }

    function updateEddie(dt){ if (eddie.happyFlash > 0) eddie.happyFlash -= dt; if (eddie.sadFlash > 0) eddie.sadFlash -= dt; if (state.glowPulse > 0) state.glowPulse -= dt * 1.5; eddie.tongue = eddie.happyFlash > 0; }
    function drawBallMarker(){ if (state.phase !== "show") return; const b = boxes.find(x => x.id === state.correctBoxId); if (b) { if (state.glowPulse > 0) { ctx.save(); ctx.globalAlpha = state.glowPulse * 0.6; ctx.shadowColor = "#b01fa5"; ctx.shadowBlur = 25 * state.glowPulse; drawTextCircle("UNAUFHALTSAM", b.x + b.w/2, b.y + b.h + 22, 20); ctx.restore(); } drawTextCircle("UNAUFHALTSAM", b.x + b.w/2, b.y + b.h + 22, 20); } }
    
    function drawEddie(){
      ctx.save(); ctx.translate(eddie.x, eddie.y); const isH = eddie.happyFlash > 0, isS = eddie.sadFlash > 0; if (isS) ctx.rotate(0.08);
      ctx.fillStyle = isH ? "#f0dcff" : isS ? "#ffe6e3" : "#fff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(-42,-4); ctx.quadraticCurveTo(-62,-16,-56,-38); ctx.stroke(); roundRect(ctx, -38, -34, 78, 40, 14, true, true);
      ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(-8, -16, 12, 0, Math.PI * 2);
      ctx.fill(); ctx.beginPath(); [-18, -2, 14].forEach(lx => { ctx.moveTo(lx, 6); ctx.lineTo(lx, 18); }); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(22,-16); ctx.lineTo(34,-30); ctx.stroke();
      ctx.fillStyle = "#fff"; roundRect(ctx, 24, -62, 46, 38, 14, true, true); ctx.fillStyle = "#000";
      if (isS){ ctx.beginPath(); ctx.moveTo(31,-58); ctx.lineTo(27,-38); ctx.lineTo(40,-54); ctx.fill(); ctx.beginPath(); ctx.moveTo(58,-58); ctx.lineTo(62,-38); ctx.lineTo(49,-54); ctx.fill(); }
      else { ctx.beginPath(); ctx.moveTo(32,-56); ctx.lineTo(24,-82); ctx.lineTo(40,-62); ctx.fill(); ctx.beginPath(); ctx.moveTo(58,-56); ctx.lineTo(66,-82); ctx.lineTo(50,-62); ctx.fill(); }
      ctx.beginPath(); ctx.arc(41,-45,11,0, Math.PI * 2); ctx.arc(58,-45,11,0, Math.PI * 2); ctx.fill();
      if (isS){ ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(37,-45); ctx.lineTo(45,-45); ctx.moveTo(54,-45); ctx.lineTo(62,-45); ctx.stroke(); }
      else { ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(41,-45,2,0, Math.PI * 2); ctx.arc(58,-45,2,0, Math.PI * 2); ctx.fill(); }
      ctx.fillStyle="#000"; ctx.beginPath(); ctx.arc(68,-37,4,0, Math.PI * 2); ctx.fill(); if (isH) { ctx.fillStyle="#b01fa5"; roundRect(ctx,60,-29,10,14,5,true,true); } ctx.restore();
    }

    function drawBoxes() {
      boxes.forEach(b => {
        const isH = state.phase === "pick" && state.hoverBoxId === b.id, isS = state.selectedBoxId === b.id, isC = state.phase === "reveal" && state.correctBoxId === b.id;
        ctx.save(); let tilt = 0; if (state.phase === "shuffle" && state.activeSwap) { if (b.id === state.activeSwap.aId) tilt = -0.05; else if (b.id === state.activeSwap.bId) tilt = 0.05; }
        ctx.translate(b.x + b.w/2, (b.y-b.lift) + b.h/2); ctx.rotate(tilt); ctx.translate(-(b.x + b.w/2), -((b.y-b.lift) + b.h/2));
        ctx.fillStyle = isH ? "#e9e9e9" : "#fff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 3; roundRect(ctx, b.x, b.y-b.lift, b.w, b.h, 12, true, true);
        const wobble = isH ? Math.sin(performance.now()/120)*4 : 0;
        ctx.save(); ctx.translate(b.x+b.w/2, (b.y-b.lift)-10); ctx.rotate(Math.sin(performance.now()/200)*0.15); ctx.fillStyle="#b01fa5"; ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(-14,-2,-10,16+wobble); ctx.quadraticCurveTo(0,30+wobble,10,16+wobble); ctx.quadraticCurveTo(14,-2,0,0); ctx.fill(); ctx.strokeStyle="#000"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,18+wobble); ctx.stroke(); ctx.restore();
        if (isH && state.phase === "pick") { ctx.strokeStyle="#000"; ctx.lineWidth=5; roundRect(ctx, b.x-4, (b.y-b.lift)-4, b.w+8, b.h+8, 14, false, true); }
        if (isS && state.phase === "reveal") { ctx.strokeStyle = state.result === "correct" ? "#0f9d58" : "#d92d20"; ctx.lineWidth=4; roundRect(ctx, b.x-4, (b.y-b.lift)-4, b.w+8, b.h+8, 14, false, true); }
        if (isC) drawTextCircle("UNAUFHALTSAM", b.x + b.w/2, (b.y-b.lift) + b.h + 22, 20); ctx.restore();
      });
    }

    function spawnParticles(x, y) { for (let i = 0; i < 14; i++) particles.push({ x, y, vx: (Math.random()-0.5)*5, vy: -Math.random()*4-1, life: 1, size: Math.random()*4+2 }); }
    function updateParticles(dt) { for (let i = particles.length-1; i >= 0; i--) { const p = particles[i]; p.x += p.vx * 60 * dt; p.y += p.vy * 60 * dt; p.vy += 0.12; p.life -= 1.8 * dt; if (p.life <= 0) particles.splice(i, 1); } }
    function drawParticles() { for (const p of particles) { ctx.save(); ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = "#b01fa5"; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); } }
    
    function gameOver() { 
      state.running = false; setPhase("gameover"); 
      if (state.score > state.best) { state.best = state.score; localStorage.setItem(BEST_KEY, String(state.best)); } 
      finalScoreDisplay.textContent = state.score; bestLineDisplay.textContent = `Best: ${state.best}`; updateHud(); 
      const board = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]"); 
      if (state.score > 0 && (board.length < 10 || state.score > board[board.length-1].score)) nameOverlay.classList.remove("hidden"); else gameOverOverlay.classList.remove("hidden"); 
    }
    
    async function shareScore() {
      const text = `UNAUFHALTSAM — I scored ${state.score}. Best: ${state.best}. Can you beat my focus run?`;
      try {
        if (navigator.share) { await navigator.share({ title: "UNAUFHALTSAM", text }); shareFeedback.textContent = "Shared."; } 
        else { await navigator.clipboard.writeText(text); shareFeedback.textContent = "Copied to clipboard."; }
      } catch (err) {
        const textArea = document.createElement("textarea"); textArea.value = text; document.body.appendChild(textArea); textArea.select();
        try { document.execCommand('copy'); shareFeedback.textContent = "Copied."; } catch (e) { shareFeedback.textContent = "Sharing failed."; }
        document.body.removeChild(textArea);
      }
      setTimeout(() => { shareFeedback.textContent = ""; }, 1600);
    }

    function updateHud() { scoreVal.textContent = state.score; roundVal.textContent = state.round; boxVal.textContent = state.boxCount; bestVal.textContent = state.best; }
    function resetGame() { state.running = false; state.score = 0; state.round = 1; state.boxCount = 2; state.stage = 1; buildRound(); updateHud(); shareFeedback.textContent = ""; gameOverOverlay.classList.add("hidden"); nameOverlay.classList.add("hidden"); startOverlay.classList.remove("hidden"); }
    function startGame() { state.running = true; state.score = 0; state.round = 1; state.boxCount = 2; state.stage = 1; buildRound(); updateHud(); shareFeedback.textContent = ""; startOverlay.classList.add("hidden"); gameOverOverlay.classList.add("hidden"); nameOverlay.classList.add("hidden"); }
    function loop(ts) { const dt = Math.min(0.033, (ts - state.lastTs) / 1000 || 0); state.lastTs = ts; ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#fff"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#eef9ee"; ctx.fillRect(0, 540, canvas.width, 180); updateBoxes(ts); updateEddie(dt); updateParticles(dt); drawParticles(); drawBallMarker(); drawBoxes(); drawEddie(); requestAnimationFrame(loop); }
    canvas.addEventListener("mousemove", (e) => { const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left)*(canvas.width/r.width), y = (e.clientY - r.top)*(canvas.height/r.height); state.hoverBoxId = null; boxes.forEach(b => { if (x >= b.x && x <= b.x+b.w && y >= b.y-b.lift && y <= b.y-b.lift+b.h) state.hoverBoxId = b.id; }); });
    canvas.addEventListener("click", () => { if (state.phase === "pick" && state.hoverBoxId !== null) { state.selectedBoxId = state.hoverBoxId; if (state.selectedBoxId === state.correctBoxId) { state.result = "correct"; eddie.happyFlash = 0.55; state.glowPulse = 1; const hit = boxes.find(b => b.id === state.selectedBoxId); spawnParticles(hit.x + hit.w/2, hit.y + hit.h + 20); } else { state.result = "wrong"; eddie.sadFlash = 0.55; } setPhase("reveal"); } });
    startBtn.onclick = startGame; restartBtn.onclick = startGame; restartTop.onclick = resetGame; shareScoreBtn.onclick = shareScore;
    saveScoreBtn.onclick = () => { 
      const n = nameInput.value.trim() || "UNAUFHALTSAM", d = Date.now(); 
      let s = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]"); 
      s.push({ name: n, score: state.score, date: d }); 
      s.sort((a,b) => b.score - a.score || a.date - b.date); 
      localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(s.slice(0,10))); 
      renderLeaderboard(d); nameOverlay.classList.add("hidden"); gameOverOverlay.classList.remove("hidden"); 
    };
    renderLeaderboard(); resetGame(); requestAnimationFrame(loop);
  </script>
</body>
</html>
