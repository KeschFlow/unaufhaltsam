<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNAUFHALTSAM – Eddie Game</title>

<style>
:root{
  --black:#000;
  --white:#fff;
  --purpur:#b01fa5;
  --bg:#f5f5f7;
  --grass:#e7f7e7;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:var(--bg);
  padding:20px;
}

canvas{
  width:100%;
  max-width:900px;
  display:block;
  margin:auto;
  border:2px solid #000;
  border-radius:20px;
  background:linear-gradient(#fff 70%,var(--grass) 70%);
}
</style>
</head>

<body>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const state = {
  phase:"show",
  correct:0,
  hover:null,
  selected:null,
  score:0,
  shuffleDuration:2000,
  swaps:0,
  activeSwap:null,
  last:0
};

const boxes=[];
const eddie={x:120,y:400,happy:0,sad:0};

function lerp(a,b,t){return a+(b-a)*t;}
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawTextCircle(text,cx,cy,r){
  const chars=text.split("");
  const step=(Math.PI*2)/chars.length;
  const rot=performance.now()/6000;

  ctx.fillStyle="#b01fa5";
  ctx.font="900 9px Arial";
  ctx.textAlign="center";
  ctx.textBaseline="middle";

  chars.forEach((c,i)=>{
    const a=i*step-Math.PI/2+rot;
    const x=cx+Math.cos(a)*r;
    const y=cy+Math.sin(a)*r;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(a+Math.PI/2);
    ctx.fillText(c,0,0);
    ctx.restore();
  });
}

function build(){
  boxes.length=0;

  const w=90,space=20;
  const total=state.count*w+(state.count-1)*space;
  const start=(canvas.width-total)/2;

  for(let i=0;i<state.count;i++){
    boxes.push({id:i,x:start+i*(w+space),y:300,w,h:90});
  }

  state.correct=Math.floor(Math.random()*boxes.length);
  state.swaps=5+state.score;
  state.phase="show";
  state.start=performance.now();
}

function startSwap(){
  if(state.swaps<=0){state.phase="pick";return;}

  let a=Math.floor(Math.random()*boxes.length);
  let b=Math.floor(Math.random()*boxes.length);
  while(b===a)b=Math.floor(Math.random()*boxes.length);

  state.activeSwap={
    a,b,
    start:performance.now(),
    dur:Math.max(260,state.shuffleDuration/5)
  };

  state.swaps--;
}

function update(ts){
  if(state.phase==="show" && ts-state.start>1200){
    state.phase="shuffle";
    startSwap();
  }

  if(state.phase==="shuffle"){
    if(!state.activeSwap){startSwap();return;}

    const s=state.activeSwap;
    const p=Math.min(1,(ts-s.start)/s.dur);

    const A=boxes[s.a];
    const B=boxes[s.b];

    const ax=A.x;
    const bx=B.x;

    A.x=lerp(ax,bx,p);
    B.x=lerp(bx,ax,p);

    A.y=300-Math.sin(p*Math.PI)*40;
    B.y=300+Math.sin(p*Math.PI)*10;

    if(p>=1){
      A.y=300;
      B.y=300;

      if(state.correct===A.id)state.correct=B.id;
      else if(state.correct===B.id)state.correct=A.id;

      state.activeSwap=null;
    }
  }
}

function drawBoxes(){
  boxes.forEach(b=>{
    const hover=state.hover===b.id;

    ctx.fillStyle=hover?"#e9e9e9":"#fff";
    ctx.strokeStyle="#000";
    ctx.lineWidth=3;

    roundRect(b.x,b.y,b.w,b.h,12);
    ctx.fill();ctx.stroke();

    if(hover && state.phase==="pick"){
      ctx.lineWidth=5;
      roundRect(b.x-4,b.y-4,b.w+8,b.h+8,14);
      ctx.stroke();

      // ZUNGE
      const tY=b.y-20+Math.sin(performance.now()/150)*3;

      ctx.fillStyle="#b01fa5";
      roundRect(b.x+35,tY,20,26,8);
      ctx.fill();
    }

    if(state.phase==="show" && b.id===state.correct){
      drawTextCircle("UNAUFHALTSAM •",b.x+45,b.y+110,18);
    }

    if(state.phase==="reveal" && b.id===state.correct){
      drawTextCircle("UNAUFHALTSAM •",b.x+45,b.y+110,18);
    }
  });
}

function drawEddie(){
  ctx.fillStyle="#fff";
  ctx.strokeStyle="#000";
  ctx.lineWidth=4;

  roundRect(eddie.x,eddie.y,80,40,14);
  ctx.fill();ctx.stroke();

  ctx.fillStyle="#000";
  ctx.beginPath();
  ctx.arc(eddie.x+20,eddie.y+10,10,0,Math.PI*2);
  ctx.fill();
}

function loop(ts){
  const dt=(ts-state.last)/1000;
  state.last=ts;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  update(ts);
  drawBoxes();
  drawEddie();

  requestAnimationFrame(loop);
}

canvas.addEventListener("mousemove",e=>{
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(canvas.width/rect.width);
  const y=(e.clientY-rect.top)*(canvas.height/rect.height);

  state.hover=null;
  boxes.forEach(b=>{
    if(x>b.x && x<b.x+b.w && y>b.y && y<b.y+b.h){
      state.hover=b.id;
    }
  });
});

canvas.addEventListener("click",()=>{
  if(state.phase==="pick" && state.hover!==null){
    state.phase="reveal";

    if(state.hover===state.correct){
      state.score++;
      state.count=Math.min(8,2+Math.floor(state.score/2));
      build();
    }else{
      state.score=0;
      state.count=2;
      build();
    }
  }
});

state.count=2;
build();
requestAnimationFrame(loop);
</script>

</body>
</html>
