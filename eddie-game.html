<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play with Eddie</title>
  <meta name="description" content="Time the throw. Eddie catches the ball. 3 misses = game over." />
  <style>
    :root{
      --black:#000;
      --white:#fff;
      --purpur:#b01fa5;
      --bg:#f5f5f7;
      --line:#111;
      --grass:#e7f7e7;
      --red:#d92d20;
      --green:#0f9d58;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--black);
      min-height:100vh;
      padding:20px 14px 40px;
    }

    .wrap{
      width:100%;
      max-width:980px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .title h1{
      font-size:clamp(28px, 5vw, 52px);
      line-height:1;
      margin-bottom:8px;
      font-weight:900;
      letter-spacing:-0.8px;
    }

    .title p{
      font-size:14px;
      opacity:.75;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:none;
      background:#000;
      color:#fff;
      padding:14px 18px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:180px;
      transition:transform .15s ease, opacity .15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:.94;
    }

    .btn.alt{
      background:#fff;
      color:#000;
      border:2px solid #000;
    }

    .panel{
      background:#fff;
      border:2px solid #000;
      border-radius:22px;
      padding:16px;
    }

    .hud{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:12px;
    }

    .stat{
      border:2px solid #000;
      border-radius:18px;
      padding:14px 12px;
      background:#fff;
      text-align:center;
    }

    .stat .label{
      font-size:12px;
      opacity:.7;
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:6px;
    }

    .stat .value{
      font-size:clamp(22px, 4vw, 34px);
      font-weight:900;
      line-height:1;
    }

    .value.good{ color:var(--green); }
    .value.bad{ color:var(--red); }

    .game-shell{
      position:relative;
      width:100%;
      background:#fff;
      border:2px solid #000;
      border-radius:24px;
      overflow:hidden;
    }

    canvas{
      display:block;
      width:100%;
      height:auto;
      background:
        linear-gradient(to bottom, #ffffff 0%, #ffffff 72%, var(--grass) 72%, var(--grass) 100%);
      cursor:none;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(255,255,255,.88);
      text-align:center;
    }

    .overlay.hidden{
      display:none;
    }

    .card{
      width:min(100%, 520px);
      background:#fff;
      border:2px solid #000;
      border-radius:22px;
      padding:24px 18px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }

    .card h2{
      font-size:clamp(24px, 4vw, 36px);
      margin-bottom:12px;
      line-height:1.05;
    }

    .card p{
      font-size:15px;
      line-height:1.45;
      opacity:.8;
      margin-bottom:14px;
    }

    .card .big{
      font-size:38px;
      font-weight:900;
      margin:10px 0 14px;
    }

    .legend{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:6px;
      justify-content:center;
    }

    .pill{
      border:2px solid #000;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:700;
      background:#fff;
    }

    .bottom-note{
      text-align:center;
      font-size:13px;
      opacity:.65;
      line-height:1.4;
    }

    @media (max-width:720px){
      .hud{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }

      .btn{
        width:100%;
      }

      .actions{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Play with Eddie</h1>
        <p>Time the throw. Eddie catches the ball. 3 misses = game over.</p>
      </div>

      <div class="actions">
        <a class="btn alt" href="index.html">← Back</a>
        <button class="btn" id="restartTop">Restart Game</button>
      </div>
    </div>

    <section class="hud">
      <div class="stat">
        <div class="label">Score</div>
        <div class="value good" id="scoreValue">0</div>
      </div>
      <div class="stat">
        <div class="label">Misses</div>
        <div class="value bad" id="missValue">0 / 3</div>
      </div>
      <div class="stat">
        <div class="label">Speed</div>
        <div class="value" id="speedValue">1.00×</div>
      </div>
      <div class="stat">
        <div class="label">Best</div>
        <div class="value" id="bestValue">0</
