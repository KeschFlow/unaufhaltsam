<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eddie’s World</title>
  <meta name="description" content="Eddie’s World. Real life. Unfiltered. Members only access." />
  <link rel="preload" as="image" href="logo.png" />

  <style>
    :root{
      --black:#000;
      --white:#fff;
      --purpur:#b01fa5;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:28px 16px;
      background:#fff;
      color:#000;
    }

    .wrap{
      width:100%;
      max-width:900px;
    }

    .hero{
      max-width:420px;
      margin:0 auto 26px;
    }

    h1{
      font-size:clamp(36px, 6vw, 64px);
      font-weight:900;
      margin-bottom:10px;
    }

    .tagline{
      letter-spacing:4px;
      font-size:14px;
      margin-bottom:24px;
      opacity:.8;
    }

    .subline{
      margin-bottom:40px;
      font-size:14px;
      opacity:.7;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .button{
      padding:18px 26px;
      border-radius:14px;
      font-weight:900;
      text-decoration:none;
      min-width:260px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      border:2px solid transparent;
    }

    .button.purpur{
      background:var(--purpur);
      color:#fff;
    }

    .button.white{
      background:#fff;
      border-color:#000;
      color:#000;
    }

    .button.dark{
      background:#000;
      color:#fff;
    }

    .note{
      margin-top:14px;
      font-size:12px;
      opacity:.6;
    }

    .links{
      margin-top:50px;
      font-size:13px;
      opacity:.6;
      display:flex;
      gap:18px;
      justify-content:center;
      flex-wrap:wrap;
    }

    footer{
      margin-top:60px;
      font-size:11px;
      opacity:.3;
    }
  </style>
</head>

<body>
  <main class="wrap">

    <img src="logo.png" class="hero" />

    <h1>Eddie’s World</h1>

    <div class="tagline">REAL LIFE · UNFILTERED · NO STAGING</div>

    <div class="subline">
      Private archive. Real moments. Members only.
    </div>

    <nav class="actions">

      <!-- PRIMARY -->
      <a class="button purpur" href="https://ko-fi.com/eddiesworld" target="_blank">
        🔐 JOIN EDDIE’S WORLD
      </a>

      <!-- SECONDARY -->
      <a class="button white" href="https://ko-fi.com/eddiesworld" target="_blank">
        🎥 WATCH EDDIE
      </a>

      <!-- TOOL -->
      <a class="button dark" href="https://keschflow.github.io/eddies-print-engine-public/" target="_blank">
        🚀 CREATE YOUR BOOK
      </a>

    </nav>

    <div class="note">
      Membership required for full access
    </div>

    <div class="links">
      <a href="https://www.youtube.com/@Eddie-Unaufhaltsam">YouTube</a>
      <a href="https://www.tiktok.com/@keschflow">TikTok</a>
      <a href="https://www.reddit.com/u/KeSchFlow">Reddit</a>
      <a href="impressum.html">Impressum</a>
      <a href="datenschutz.html">Datenschutz</a>
    </div>

    <footer>
      © 2026 Eddie’s World
    </footer>

  </main>
</body>
</html>
