<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eddie’s World | Unaufhaltsam</title>
  <style>
    :root {
      --black: #000;
      --white: #fff;
      --purpur: #b01fa5;
      --bg: #f5f5f7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      background: var(--bg);
      color: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 900px;
      width: 100%;
    }

    h1 {
      font-size: clamp(32px, 8vw, 64px);
      font-weight: 900;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 18px;
      opacity: 0.7;
      margin-bottom: 40px;
      font-weight: 700;
    }

    /* --- NEW ACTION LAYOUT --- */
    .hero-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-top: 32px;
    }

    .hero-actions-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      width: 100%;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 24px;
      border-radius: 16px;
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 0.1s ease, background 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn:active { transform: scale(0.97); }

    .btn-game {
      min-width: 320px;
      padding: 20px 28px;
      background: var(--white);
      color: var(--black);
      border: 3px solid var(--black);
      font-size: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    
    .btn-game:hover { background: #fafafa; }

    .btn-primary { background: var(--purpur); color: var(--white); }
    .btn-secondary { background: var(--black); color: var(--white); }
    .btn-dark { background: #333; color: var(--white); }

    @media (max-width: 720px) {
      .hero-actions-row {
        flex-direction: column;
      }
      .btn {
        width: 100%;
        max-width: 420px;
      }
      .btn-game {
        min-width: 0;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>EDDIE’S WORLD</h1>
    <p class="subtitle">UNAUFHALTSAM & UNSTOPPABLE</p>

    <div class="hero-actions">

      <a class="btn btn-game" href="https://keschflow.github.io/unaufhaltsam/eddie-game.html?v=5.7">
        🎯 CAN YOU STAY FOCUSED?
      </a>

      <div class="hero-actions-row">
        <a class="btn btn-primary" href="YOUR_MEMBERSHIP_LINK">
          🔐 JOIN EDDIE’S WORLD
        </a>

        <a class="btn btn-secondary" href="YOUR_WATCH_LINK">
          🎥 WATCH EDDIE
        </a>

        <a class="btn btn-dark" href="https://keschflow.github.io/eddies-print-engine-public/?v=1">
          🚀 CREATE YOUR BOOK
        </a>
      </div>

    </div>
  </div>

</body>
</html>
