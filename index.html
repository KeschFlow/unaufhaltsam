<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eddie’s World</title>

<style>
:root {
  --black:#000;
  --white:#fff;
  --purpur:#b01fa5;
  --bg:#f5f5f7;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:var(--bg);
  color:var(--black);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

.container{
  text-align:center;
  max-width:900px;
  width:100%;
}

h1{
  font-size:clamp(32px,8vw,64px);
  font-weight:900;
  margin-bottom:10px;
}

.subtitle{
  font-size:16px;
  opacity:.7;
  margin-bottom:40px;
  font-weight:700;
}

.hero-actions{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

.hero-row{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:16px 24px;
  border-radius:16px;
  font-weight:900;
  text-decoration:none;
  display:inline-flex;
  justify-content:center;
  align-items:center;
  transition:0.1s;
}

.btn:active{
  transform:scale(0.97);
}

.btn-game{
  background:#fff;
  color:#000;
  border:2px solid #000;
  min-width:280px;
}

.btn-primary{
  background:var(--purpur);
  color:#fff;
}

.btn-dark{
  background:#000;
  color:#fff;
}

@media(max-width:720px){
  .hero-row{
    flex-direction:column;
    width:100%;
  }

  .btn{
    width:100%;
    max-width:420px;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>EDDIE’S WORLD</h1>
  <p class="subtitle">UNAUFHALTSAM & UNSTOPPABLE</p>

  <div class="hero-actions">

    <a class="btn btn-game" href="https://keschflow.github.io/unaufhaltsam/eddie-game.html?v=5.7">
      🎯 PROVE YOUR FOCUS
    </a>

    <div class="hero-row">

      <a class="btn btn-primary" href="https://ko-fi.com/eddiesworld">
        🔐 JOIN EDDIE’S WORLD
      </a>

      <a class="btn btn-dark" href="https://keschflow.github.io/eddies-print-engine-public/?v=1">
        🚀 CREATE YOUR BOOK
      </a>

    </div>

  </div>

</div>

</body>
</html>
