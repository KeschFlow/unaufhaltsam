<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eddie’s World</title>
  <meta name="description" content="Eddie’s World. Real life. Unfiltered. Access, shop and tools." />
  <link rel="preload" as="image" href="logo.png" />

  <style>
    :root{
      --black:#000;
      --white:#fff;
      --purpur:#b01fa5;
      --purpur-dark:#8e1685;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    html, body{
      width:100%;
      min-height:100%;
      background:var(--white);
      color:var(--black);
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:28px 16px;
    }

    .wrap{
      width:100%;
      max-width:900px;
    }

    .hero{
      width:100%;
      max-width:420px;
      height:auto;
      margin:0 auto 26px;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
    }

    h1{
      font-size:clamp(36px, 6vw, 64px);
      font-weight:900;
      margin-bottom:10px;
      letter-spacing:-0.8px;
    }

    .tagline{
      letter-spacing:4px;
      font-size:14px;
      margin-bottom:30px;
      opacity:.85;
      text-transform:uppercase;
    }

    .subline{
      margin-bottom:40px;
      font-size:13px;
      opacity:.7;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .button{
      padding:20px 28px;
      border-radius:14px;
      font-weight:900;
      text-decoration:none;
      transition:opacity .18s ease, transform .18s ease;
      min-width:260px;
      max-width:92vw;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      line-height:1;
      border:2px solid transparent;
    }

    .button:hover{
      opacity:.92;
      transform:translateY(-1px);
    }

    .button:focus-visible{
      outline:3px solid rgba(176,31,165,.28);
      outline-offset:3px;
    }

    .button.purpur{
      background:var(--purpur);
      color:var(--white);
      border-color:var(--purpur);
    }

    .button.white{
      background:var(--white);
      color:var(--black);
      border-color:var(--black);
    }

    .button.dark{
      background:var(--black);
      color:var(--white);
      border-color:var(--black);
    }

    .links{
      margin-top:50px;
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
      font-size:13px;
      opacity:.6;
    }

    .links a{
      color:var(--black);
      text-decoration:none;
    }

    .links a:hover,
    .links a:focus-visible{
      text-decoration:underline;
    }

    footer{
      margin-top:60px;
      font-size:11px;
      opacity:.3;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    @media (max-width:520px){
      .button{
        width:100%;
      }

      .tagline{
        font-size:12px;
        letter-spacing:3px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <img src="logo.png" alt="Eddie’s World Logo" class="hero" />

    <h1>Eddie’s World</h1>
    <div class="tagline">REAL LIFE · UNFILTERED · NO STAGING</div>

    <div class="subline">
      From your photos → print-ready books.
    </div>

    <nav class="actions" aria-label="Main navigation">

      <a
        class="button purpur"
        href="https://ko-fi.com/eddiesworld"
        target="_blank"
        rel="noopener noreferrer"
      >
        🔐 ACCESS
      </a>

      <a
        class="button white"
        href="https://jutn.creator-spring.com/listing/eddies-world-unaufhaltsam"
        target="_blank"
        rel="noopener noreferrer"
      >
        🛒 SHOP
      </a>

      <a
        class="button dark"
        href="https://keschflow.github.io/eddies-print-engine-public/"
        target="_blank"
        rel="noopener noreferrer"
      >
        🚀 CREATE YOUR BOOK
      </a>

    </nav>

    <div class="links">
      <a href="https://www.youtube.com/@Eddie-Unaufhaltsam" target="_blank" rel="noopener noreferrer">YouTube</a>
      <a href="https://www.tiktok.com/@keschflow" target="_blank" rel="noopener noreferrer">TikTok</a>
      <a href="https://www.reddit.com/u/KeSchFlow" target="_blank" rel="noopener noreferrer">Reddit</a>
      <a href="impressum.html">Impressum</a>
      <a href="datenschutz.html">Datenschutz</a>
    </div>

    <footer>
      © 2026 Eddie’s World · Unaufhaltsam.
    </footer>
  </main>
</body>
</html>
