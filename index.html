<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDDIE’S WORLD | Official</title>
  <style>
    :root { 
      --black: #000; 
      --white: #fff; 
      --purpur: #b01fa5; 
      --bg: #f5f5f7; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    body { 
      background: var(--bg); 
      color: var(--black); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      padding: 40px 20px; 
    }

    .container { text-align: center; max-width: 600px; width: 100%; }

    /* Eddie Avatar */
    .eddie-avatar {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      background: #fff;
      border: 3px solid #000;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    .eddie-avatar img { width: 100%; height: auto; display: block; }

    h1 { font-size: clamp(32px, 8vw, 48px); font-weight: 900; margin-bottom: 8px; letter-spacing: -1.5px; }
    .subtitle { font-size: 16px; opacity: 0.6; margin-bottom: 32px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

    /* Experience Box (Der Einstieg) */
    .exp-container {
      background: #fff;
      border: 2px solid #000;
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    }

    .exp-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; display: block; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 18px 24px;
      border-radius: 16px;
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: none;
      cursor: pointer;
      margin-bottom: 12px;
    }

    /* Game Button */
    .btn-game {
      background: var(--black);
      color: var(--white);
      font-size: 18px;
    }
    .btn-game:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }

    .btn-subtext { font-size: 12px; opacity: 0.5; font-weight: 700; margin-top: 8px; display: block; }

    /* Main Actions */
    .btn-primary { background: var(--purpur); color: var(--white); }
    .btn-secondary { background: #fff; color: #000; border: 2px solid #000; }

    .member-note { margin: 24px 0; font-size: 13px; opacity: 0.5; font-weight: 700; }

    /* Footer */
    .footer-links {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding-top: 24px;
      border-top: 1px solid rgba(0,0,0,0.08);
    }
    .footer-links a { color: #888; font-size: 13px; text-decoration: none; font-weight: 700; }
    .footer-links a:hover { color: #000; }

    @media (max-width: 480px) {
      h1 { font-size: 38px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="eddie-avatar">
      <img src="eddie_head.png" alt="Eddie">
    </div>

    <h1>EDDIE’S WORLD</h1>
    <p class="subtitle">Unstoppable Focus</p>

    <div class="exp-container">
      <span class="exp-title">Eddie is waiting for you.</span>
      <a class="btn btn-game" href="eddie-game.html?v=6.1">
        YOU WON'T LAST LONG
      </a>
      <span class="btn-subtext">Eddie is faster than you think.</span>
    </div>

    <a class="btn btn-primary" href="https://ko-fi.com/eddiesworld">
      🔐 JOIN MEMBERSHIP
    </a>

    <a class="btn btn-secondary" href="https://keschflow.github.io/eddies-print-engine-public/?v=6.1">
      🚀 CREATE YOUR BOOK
    </a>

    <p class="member-note">Full engine access requires membership.</p>

    <div class="footer-links">
      <a href="https://www.youtube.com/@eddiesworld" target="_blank">YOUTUBE</a>
      <a href="https://www.tiktok.com/@eddiesworld" target="_blank">TIKTOK</a>
      <a href="https://www.reddit.com/r/eddiesworld" target="_blank">REDDIT</a>
      <a href="impressum.html">IMPRESSUM</a>
      <a href="datenschutz.html">DATENSCHUTZ</a>
    </div>
  </div>

</body>
</html>
